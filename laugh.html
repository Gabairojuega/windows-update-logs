<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>theylaugh</title>
    <style>
        body {
            background-color: #050505; /* Pitch black */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            transition: background-color 0.1s ease;
        }
        .technical-btn {
            font-size: 32px; /* Sleeker, serious text size */
            background: none;
            border: none;
            cursor: pointer;
            color: #444; /* Dim gray so it looks like standard code */
            transition: all 0.3s ease;
            user-select: none;
            letter-spacing: 2px;
        }
        .technical-btn:hover {
            color: #8b0000; /* Turns dark red when hovered */
            text-shadow: 0 0 8px rgba(139, 0, 0, 0.6);
        }
        .warning-text {
            color: #222; /* Barely visible background status text */
            font-size: 12px;
            margin-top: 40px;
            letter-spacing: 3px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- This is your serious, technical hexadecimal laugh button -->
    <button class="technical-btn" id="trigger">0x480x410x480x41</button>
    <div class="warning-text">SYSTEM_READY // EXECUTION_PENDING</div>

    <script>
        document.getElementById('trigger').addEventListener('click', () => {
            // 1. Trigger an instant red flash to show the system was tripped
            document.body.style.backgroundColor = "#2a0000"; 
            
            // 2. Wait exactly 300 milliseconds (long enough to see the flash)
            setTimeout(() => {
                // 3. TRANSFER TO THE NEXT WEBSITE
                // Replace the URL below with whatever page or file you want them to go to next!
                window.location.href = "found.html";
            }, 300);
        });
    </script>

</body>
</html>
