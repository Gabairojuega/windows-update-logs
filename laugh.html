<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>laugh</title>
    <style>
        body {
            background-color: #0d1117; /* Dark hacker background */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            cursor: pointer;
        }
        .emoji-btn {
            font-size: 100px; /* Makes the emoji huge */
            background: none;
            border: none;
            cursor: pointer;
            transition: transform 0.2s;
            user-select: none;
        }
        .emoji-btn:hover {
            transform: scale(1.2); /* Slightly grows when hovered */
        }
    </style>
</head>
<body>

    <!-- This is the clickable laughing emoji widget -->
    <button class="emoji-btn" onclick="playAudio()">(0x480x410x480x41)﻿</button>

    <!-- Replace the URL inside src="" with your custom audio link if you want -->
    <audio id="laughSound" src="https://files.catbox.moe/wydmbp.mp3"></audio>

    <script>
        function playAudio() {
            var audio = document.getElementById("laughSound");
            audio.play();
        }
    </script>

</body>
</html>
